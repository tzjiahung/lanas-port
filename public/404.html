<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script>
    // GitHub Pages SPA redirect: forward /path → /#/path
    // Strip trailing slash GitHub Pages silently adds (e.g. /shopback-nma/)
    var path = window.location.pathname.replace(/\/+$/, '');
    if (path && path !== '/') {
      window.location.replace('/#' + path + window.location.search);
    }
  </script>
</head>
<body></body>
</html>
